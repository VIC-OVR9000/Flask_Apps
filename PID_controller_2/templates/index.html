<!DOCTYPE html>
<html>
<head>
    <title>System Dynamics: Adaptive Compensation</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@300;600&display=swap');
        
        body {
            background-color: #e8dbc5;
            font-family: 'Crimson Pro', serif;
            color: #2c2c2c;
            display: flex; flex-direction: column; align-items: center;
            padding: 20px;
            background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png');
        }

        .journal-container {
            border: 2px solid #5d534a;
            padding: 30px;
            max-width: 900px;
            box-shadow: 10px 10px 25px rgba(0,0,0,0.15);
            background: rgba(232, 219, 197, 0.9);
        }

        .control-panel {
            display: flex;
            justify-content: space-around;
            border-bottom: 1px double #5d534a;
            padding-bottom: 15px;
            margin-bottom: 15px;
        }

        .param-group { text-align: center; }
        
        label { display: block; font-weight: bold; font-size: 0.8em; margin-bottom: 5px; }
        
        input[type=range] {
            cursor: pointer;
            filter: sepia(50%) contrast(150%);
        }

        .simulation-frame {
            width: 800px; height: 350px;
            background: #fdf6e3;
            border: 1px inset #5d534a;
            position: relative;
            overflow: hidden;
            margin: 20px 0;
        }

        #object {
            width: 18px; height: 18px;
            background: radial-gradient(circle at 30% 30%, #444, #000);
            border-radius: 50%;
            position: absolute;
            transform: translate(-50%, -50%);
            transition: transform 0.05s linear;
        }

        .origin-cross {
            position: absolute;
            top: 50%; left: 50%;
            width: 30px; height: 30px;
            border: 0.5px solid rgba(93, 83, 74, 0.4);
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>

<div class="journal-container">
    <header style="text-align: center; border-bottom: 1px solid #5d534a; margin-bottom: 10px;">
        <h1 style="margin: 0; letter-spacing: 2px;">ADAPTIVE GRAVITY COMPENSATION</h1>
        <p style="margin: 5px; font-size: 0.9em;"><i>Manual Tuning Interface — Agent Kamaka Labs</i></p>
    </header>

    <div class="control-panel">
        <div class="param-group">
            <label>K-Gain (Proportional)</label>
            <input type="range" id="kp" min="0" max="50" value="10.7" step="0.1">
            <div id="val-kp">10.7</div>
        </div>
        <div class="param-group">
            <label>K-Damp (Derivative)</label>
            <input type="range" id="kd" min="0" max="30" value="7.3" step="0.1">
            <div id="val-kd">7.3</div>
        </div>
        <div class="param-group">
            <label>K-Int (Integral)</label>
            <input type="range" id="ki" min="0" max="20" value="3.0" step="0.1">
            <div id="val-ki">3.0</div>
        </div>
    </div>

    <div class="simulation-frame">
        <div class="origin-cross"></div>
        <div id="object"></div>
    </div>

    <div style="display: flex; justify-content: space-between; font-size: 0.85em;">
        <div><b>Observed Error:</b> <span id="val-e">0.00</span>m</div>
        <div><b>Force Magnitude (Fc):</b> <span id="val-fc">0.00</span>μN</div>
        <div><b>Disturbance:</b> [W-A-S-D]</div>
    </div>
</div>

<script>
    const keys = {};
    window.onkeydown = (e) => keys[e.key.toLowerCase()] = true;
    window.onkeyup = (e) => keys[e.key.toLowerCase()] = false;

    async function loop() {
        const dist = {
            x: (keys['d'] ? 4 : 0) + (keys['a'] ? -4 : 0),
            y: (keys['s'] ? 4 : 0) + (keys['w'] ? -4 : 0)
        };

        const params = {
            kp: document.getElementById('kp').value,
            kd: document.getElementById('kd').value,
            ki: document.getElementById('ki').value,
            dist_x: dist.x,
            dist_y: dist.y
        };

        // Update value labels
        document.getElementById('val-kp').innerText = params.kp;
        document.getElementById('val-kd').innerText = params.kd;
        document.getElementById('val-ki').innerText = params.ki;

        const response = await fetch('/update', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(params)
        });
        
        const data = await response.json();
        const obj = document.getElementById('object');
        
        // Map 0,0 to center of 800x350 frame
        obj.style.left = (400 + data.x) + 'px';
        obj.style.top = (175 + data.y) + 'px';
        
        document.getElementById('val-e').innerText = data.error.toFixed(2);
        document.getElementById('val-fc').innerText = data.fc.toFixed(2);
        
        requestAnimationFrame(loop);
    }
    loop();
</script>

</body>
</html>
