<!DOCTYPE html>
<html>
<head>
    <title>System Dynamics: Observed Control Force</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@300;600&display=swap');
        
        body {
            background-color: #e8dbc5; /* Tattered paper color */
            font-family: 'Crimson Pro', serif;
            color: #2c2c2c;
            display: flex; flex-direction: column; align-items: center;
            padding: 40px;
            background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png');
        }

        .journal-container {
            border: 2px solid #5d534a;
            padding: 30px;
            max-width: 900px;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.1);
        }

        header {
            text-align: center;
            border-bottom: 1px solid #5d534a;
            margin-bottom: 20px;
        }

        .simulation-frame {
            width: 600px; height: 400px;
            background: #fdf6e3;
            border: 1px inset #5d534a;
            position: relative;
            overflow: hidden;
            margin: 20px 0;
        }

        #object {
            width: 20px; height: 20px;
            background: radial-gradient(circle at 30% 30%, #555, #000);
            border-radius: 50%;
            position: absolute;
            transform: translate(-50%, -50%);
        }

        .origin-cross {
            position: absolute;
            top: 50%; left: 50%;
            width: 20px; height: 20px;
            border: 1px dashed #999;
            transform: translate(-50%, -50%);
        }

        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 100%; }
        .stat-box { border: 1px solid #5d534a; padding: 10px; font-size: 0.9em; }
    </style>
</head>
<body>

<div class="journal-container">
    <header>
        <h1>SYSTEM DYNAMICS: ADAPTIVE COMPENSATION</h1>
        <p><i>Field Journal of Agent Kamaka Research — Ref: SIA-V Sovereign</i></p>
    </header>

    <div class="stats">
        <div class="stat-box">
            <strong>II. ADAPTIVE PARAMETERS (K)</strong><br>
            K_gain: 10.7 μN/m <br>
            K_damp: 7.3 μN·s/m
        </div>
        <div class="stat-box">
            <strong>III. OBSERVED DATA</strong><br>
            Error e(t): <span id="val-e">0.00</span>m<br>
            Control Force Fc: <span id="val-fc">0.00</span>μN
        </div>
    </div>

    <div class="simulation-frame" id="frame">
        <div class="origin-cross"></div>
        <div id="object"></div>
    </div>

    <p style="font-size: 0.8em; text-align: center;">
        [CONTROL: W,A,S,D to apply EXTERNAL DISTURBANCE vectors]
    </p>
</div>

<script>
    let dist = { x: 0, y: 0 };
    const keys = {};

    window.onkeydown = (e) => keys[e.key.toLowerCase()] = true;
    window.onkeyup = (e) => keys[e.key.toLowerCase()] = false;

    async function loop() {
        dist.x = (keys['d'] ? 2 : 0) + (keys['a'] ? -2 : 0);
        dist.y = (keys['s'] ? 2 : 0) + (keys['w'] ? -2 : 0);

        const response = await fetch('/update', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ dist_x: dist.x, dist_y: dist.y })
        });
        
        const data = await response.json();
        const obj = document.getElementById('object');
        
        // Map simulation coordinates to frame (Center is 300, 200)
        obj.style.left = (300 + data.x) + 'px';
        obj.style.top = (200 + data.y) + 'px';
        
        document.getElementById('val-e').innerText = data.error.toFixed(2);
        document.getElementById('val-fc').innerText = data.fc.toFixed(2);
        
        requestAnimationFrame(loop);
    }
    loop();
</script>

</body>
</html>
